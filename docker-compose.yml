services:
  db:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nest_ordering}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-nest_ordering}
      REDIS_URL: redis://redis:6379
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - '${PORT:-3000}:3000'

  preprocess:
    image: node:${NODE_VERSION:-22}-alpine
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/data:ro
      - ./scripts:/scripts:ro
    entrypoint: [ 'sh', '-c', 'apk add --no-cache redis && node /scripts/preprocess-coupons.js /data' ]
    restart: 'no'

volumes:
  pgdata:
  redisdata:

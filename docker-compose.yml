services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nest_ordering
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/nest_ordering
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: production
    ports:
      - '3000:3000'

  preprocess:
    image: node:22-alpine
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/data:ro
      - ./scripts:/scripts:ro
    entrypoint:
      [
        'sh',
        '-c',
        'apk add --no-cache redis && node /scripts/preprocess-coupons.js /data',
      ]
    restart: 'no'

volumes:
  pgdata:
  redisdata:
